<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roller Speed | Inicio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .hero-section {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1599058917233-358384457e93?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            color: white;
            padding: 100px 0;
            text-align: center;
        }
    </style>
</head>
<body>

    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <header class="hero-section">
        <div class="container">
            <h1 class="display-3 fw-bold">Bienvenidos a Roller Speed</h1>
            <p class="lead">Escuela de patinaje profesional y recreativo.</p>
            <a th:href="@{/registro/estudiante}" class="btn btn-primary btn-lg mt-3">Inscríbete Ahora</a>
        </div>
    </header>

    <section class="container my-5">
        <div class="row text-center">
            <div class="col-md-4">
                <h3>Valores</h3>
                <p>Disciplina, compromiso y pasión en cada entrenamiento.</p>
            </div>
            <div class="col-md-4">
                <h3>Servicios</h3>
                <p>Clases personalizadas para todos los niveles.</p>
            </div>
            <div class="col-md-4">
                <h3>Eventos</h3>
                <p>Participa en nuestras competencias y festivales.</p>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
