<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Lista de Estudiantes | Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="text-primary">Estudiantes Inscritos</h2>
            <a th:href="@{/register/student}" class="btn btn-success">+ Nuevo Estudiante</a>
        </div>

        <div class="card shadow border-0">
            <div class="card-body p-0">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Nivel</th>
                            <th>Contacto Emergencia</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${estudiantes.empty}">
                            <td colspan="5" class="text-center py-4 text-muted">No hay estudiantes registrados actualmente.</td>
                        </tr>
                        <tr th:each="estudiante : ${estudiantes}">
                            <td th:text="${estudiante.id}">1</td>
                            <td th:text="${estudiante.nombre}" class="fw-bold">Juan Pérez</td>
                            <td>
                                <span th:text="${estudiante.nivel}" 
                                      th:classappend="${estudiante.nivel == 'Avanzado' ? 'badge bg-danger' : (estudiante.nivel == 'Intermedio' ? 'badge bg-warning text-dark' : 'badge bg-info text-dark')}">
                                    Nivel
                                </span>
                            </td>
                            <td th:text="${estudiante.contactoEmergencia}">300...</td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary">Editar</button>
                                <button class="btn btn-sm btn-outline-danger">Eliminar</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
