<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario Instructor | Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <div class="card border-0 shadow-sm">
            <div class="card-header bg-dark text-white p-3">
                <h3 class="mb-0">Gestión de Horarios - Instructores</h3>
            </div>
            <div class="card-body">
                <table class="table table-striped align-middle">
                    <thead>
                        <tr>
                            <th>Instructor</th>
                            <th>Especialidad</th>
                            <th>Días Asignados</th>
                            <th>Bloque Horario</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="bg-secondary text-white rounded-circle p-2 me-2" style="width: 35px; height: 35px; text-align: center;">TE</div>
                                    <strong>Tomas Echeverri</strong>
                                </div>
                            </td>
                            <td>Velocidad</td>
                            <td>Lun, Mie, Vie</td>
                            <td>04:00 PM - 06:00 PM</td>
                        </tr>
                        <tr>
                            <td>
                                <div class="d-flex align-items-center">
                                    <div class="bg-secondary text-white rounded-circle p-2 me-2" style="width: 35px; height: 35px; text-align: center;">JT</div>
                                    <strong>Juan Tobón</strong>
                                </div>
                            </td>
                            <td>Artístico</td>
                            <td>Sábados</td>
                            <td>08:00 AM - 12:00 PM</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
