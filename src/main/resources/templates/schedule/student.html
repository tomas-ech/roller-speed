<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Horario Estudiantes | Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container mt-5">
        <h2 class="text-center mb-4">Calendario de Clases - Estudiantes</h2>
        
        <div class="table-responsive shadow-sm">
            <table class="table table-bordered bg-white">
                <thead class="table-primary text-center">
                    <tr>
                        <th>Hora</th>
                        <th>Lunes</th>
                        <th>Miércoles</th>
                        <th>Viernes</th>
                        <th>Sábado</th>
                    </tr>
                </thead>
                <tbody class="text-center">
                    <tr>
                        <td class="fw-bold">08:00 AM</td>
                        <td class="table-info">Principiantes</td>
                        <td class="table-info">Principiantes</td>
                        <td>-</td>
                        <td class="table-warning">Infantil</td>
                    </tr>
                    <tr>
                        <td class="fw-bold">10:00 AM</td>
                        <td>-</td>
                        <td class="table-warning">Infantil</td>
                        <td class="table-info">Principiantes</td>
                        <td class="table-danger">Avanzado</td>
                    </tr>
                    <tr>
                        <td class="fw-bold">04:00 PM</td>
                        <td class="table-success">Intermedio</td>
                        <td>-</td>
                        <td class="table-success">Intermedio</td>
                        <td>-</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <p class="mt-3 text-muted">* Los niveles se asignan según la evaluación técnica inicial.</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
