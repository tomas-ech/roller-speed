<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ups! Algo salió mal | Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-container {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .error-code {
            font-size: 6rem;
            font-weight: bold;
            color: #dc3545;
        }
    </style>
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container error-container">
        <div class="card shadow-lg border-0 p-5">
            <div class="error-code" th:text="${status}">500</div>
            <h2 class="mb-4">¡Oops! Tenemos un pequeño problema técnico</h2>
            
            <p class="lead text-muted mb-4" th:switch="${status}">
                <span th:case="404">Parece que la pista que buscas no existe. ¡Asegúrate de seguir el camino correcto!</span>
                <span th:case="500">Hubo un fallo en nuestros motores internos. Estamos trabajando para solucionarlo.</span>
                <span th:case="*">Ha ocurrido un error inesperado en la aplicación.</span>
            </p>

            <div class="mt-2">
                <a th:href="@{/}" class="btn btn-primary btn-lg px-5">Volver al Inicio</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
