<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Instructor | Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-dark text-white p-3">
                        <h3 class="mb-0">Registro de Nuevo Instructor</h3>
                    </div>
                    <div class="card-body p-4">
                        <form action="#" method="post">
                            <div class="mb-3">
                                <label class="form-label">Nombre y Apellidos</label>
                                <input type="text" class="form-control" required>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Especialidad</label>
                                    <select class="form-select">
                                        <option value="velocidad">Velocidad</option>
                                        <option value="artistico">Artístico</option>
                                        <option value="urbano">Urbano / Slalom</option>
                                    </select>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Años de Experiencia</label>
                                    <input type="number" class="form-control" min="0">
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Hoja de Vida / Resumen Profesional</label>
                                <textarea class="form-control" rows="3" placeholder="Cuéntanos tu trayectoria..."></textarea>
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-dark btn-lg">Postularme como Instructor</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
