<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="es">
<head>
    <meta charset="UTF-8">
    <title>Inscripción Estudiante | Roller Speed</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0">
                    <div class="card-header bg-primary text-white p-3">
                        <h3 class="mb-0">Formulario de Inscripción - Estudiante</h3>
                    </div>
                    <div class="card-body p-4">
                        <form action="#" method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Nombre Completo</label>
                                    <input type="text" class="form-control" placeholder="Ej: Juan Pérez" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Fecha de Nacimiento</label>
                                    <input type="date" class="form-control" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Nivel de Experiencia</label>
                                <select class="form-select">
                                    <option value="principiante">Principiante (Desde cero)</option>
                                    <option value="intermedio">Intermedio</option>
                                    <option value="avanzado">Avanzado / Competencia</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Contacto de Emergencia (Nombre y Teléfono)</label>
                                <input type="text" class="form-control" placeholder="Ej: María Pérez - 3001234567">
                            </div>

                            <div class="d-grid mt-4">
                                <button type="submit" class="btn btn-primary btn-lg">Completar Inscripción</button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
